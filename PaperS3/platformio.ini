; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5papers3]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_size = 16MB
board_build.partitions = custom_16MB.csv
board_build.filesystem = spiffs
build_flags = 
	-DBOARD_HAS_PSRAM
	-DESP32S3
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-mfix-esp32-psram-cache-issue
	-DCONFIG_SPIRAM_USE=1
	-DCORE_DEBUG_LEVEL=2
; Official PaperS3 docs pin EPDIY at:
; epdiy=https://github.com/vroland/epdiy.git#d84d26ebebd780c4c9d4218d76fbe2727ee42b47
; Current M5Unified/M5GFX Arduino stack builds PaperS3 without listing EPDIY
; explicitly here; keeping the exact official pin above documents the known-good
; reference without forcing every local build to clone GitHub.
lib_deps = 
	; Official M5PaperS3-UserDemo uses M5Unified 0.2.10 + M5GFX 0.2.15.
	; Keep Vink on the locally validated Arduino stack below; runtime diagnostics
	; verify actual rotation/geometry to catch M5GFX/M5Unified drift on-device.
	m5stack/M5Unified@0.2.11
	; Lightweight JSON serialization for config persistence.
	bblanchon/ArduinoJson@^6.21.5
